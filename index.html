 leaning on a bridge railing, looking over a canal with moored boats and palm trees in Paraty","caption":"Paraty, 2025"},{"src":"/photographs/home/mountain.jpg","alt":"Bare rock peak rising above dense forest under a blue sky near Paraty","caption":"Paraty, 2025"},{"src":"/photographs/home/paraty-street.jpg","alt":"Person walking down a cobblestone street lined with white colonial houses in Paraty","caption":"Paraty, 2025"},{"src":"/photographs/home/water-texture.jpg","alt":"Ripples on green sea water","caption":"Paraty, 2025"},{"src":"/photographs/home/yellow-door.jpg","alt":"Yellow-framed doorway of a small clothing shop set in a white wall in Paraty","caption":"Paraty, 2025"}]</script><script>
    const data = document.getElementById('home-photographs')?.textContent ?? '[]';
    const photographs = JSON.parse(data);
    const root = document.querySelector('[data-photo-rotator]');
    const photographNode = root?.querySelector('[data-photograph]');
    const caption = root?.querySelector('[data-photo-caption]');
    const button = root?.querySelector('[data-next-photo]');

    let index = 0;

    button?.addEventListener('click', () => {
      if (!photographNode || !caption || photographs.length < 2) return;

      let next = Math.floor(Math.random() * photographs.length);
      if (next === index) next = (next + 1) % photographs.length;
      index = next;

      const photograph = photographs[index];
      photographNode.src = photograph.src;
      photographNode.alt = photograph.alt;
      caption.textContent = photograph.caption;
    });
